name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy-infrastructure:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/template.yaml \
            --stack-name rcert-voting-prod \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name rcert-voting-prod \
            --query 'Stacks[0].Outputs' \
            --output table

  deploy-frontend:
    name: Deploy React App to S3
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build React app
        run: yarn build
        env:
          REACT_APP_API_URL: ${{ needs.deploy-infrastructure.outputs.api_url }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Get S3 bucket name
        id: s3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name rcert-voting-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`ReactAppBucket`].OutputValue' \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        run: |
          aws s3 sync build/ s3://${{ steps.s3.outputs.bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query 'DistributionList.Items[?Origins.Items[?DomainName contains `${{ steps.s3.outputs.bucket }}`]].Id' \
            --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
          fi
