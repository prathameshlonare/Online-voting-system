name: RCERT Voting System

on:
  push:
    branch:
      - main
  pull_request:
    branch:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install 

      - name: Build Project
        run: npm run build 

      - name: Run Tests
        run: npm test -- --watchAll=false --coverage
