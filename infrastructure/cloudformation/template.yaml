      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  GetVotingResultsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetVotingResultsLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  ResetElectionCyclePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResetElectionCycleLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  StartElectionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StartElectionLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  StopElectionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StopElectionLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  SubmitVotePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SubmitVoteLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  UploadStudentMasterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UploadStudentMasterLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  # ─────────────────────────────────────────────
  # Cognito PreSignUp Permission
  # ─────────────────────────────────────────────

  ValidateStudentRegistrationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ValidateStudentRegistrationLambda
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # ─────────────────────────────────────────────
  # CloudWatch Dashboard + Alarms
  # ─────────────────────────────────────────────

  VotingDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectName}-dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations & Errors",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ProjectName}-submitVote"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ProjectName}-submitVote"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ProjectName}-getCandidate"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ProjectName}-getCandidate"]
                ],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway Latency",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "${ProjectName}-api"],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "${ProjectName}-api"]
                ],
                "period": 300,
                "stat": "Average"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB Read/Write Capacity",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${ProjectName}-votes"],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${ProjectName}-votes"]
                ],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Duration",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProjectName}-submitVote"],
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProjectName}-checkEligibility"]
                ],
                "period": 300,
                "stat": "Average"
              }
            }
          ]
        }

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-lambda-errors"
      AlarmDescription: Alert when Lambda error rate exceeds threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Sub "${ProjectName}-submitVote"

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-api-5xx"
      AlarmDescription: Alert when API Gateway returns 5xx errors
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub "${ProjectName}-api"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${VotingApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoUserPoolClient
  ReactAppBucket:
    Description: S3 bucket for React app
    Value: !Ref ReactAppBucket
  DashboardUrl:
    Description: CloudWatch Dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-dashboard"
