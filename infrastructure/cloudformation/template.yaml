  # ─────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────

  VotingApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      Description: RCERT Voting System REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # --- Public routes (no auth) ---

  GetCandidateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VotingApi
      ParentId: !GetAtt VotingApi.RootResourceId
      PathPart: getCandidate

  GetCandidateMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref VotingApi
      ResourceId: !Ref GetCandidateResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCandidateLambda.Arn}/invocations"

  # --- Authenticated routes ---

  SubmitVoteResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VotingApi
      ParentId: !GetAtt VotingApi.RootResourceId
      PathPart: submitVote

  SubmitVoteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref VotingApi
      ResourceId: !Ref SubmitVoteResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SubmitVoteLambda.Arn}/invocations"

  CheckEligibilityResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VotingApi
      ParentId: !GetAtt VotingApi.RootResourceId
