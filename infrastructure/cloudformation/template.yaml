  # --- Cognito Authorizer ---

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuthorizer
      RestApiId: !Ref VotingApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn

  # --- API Gateway Deployment ---

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetCandidateMethod
      - SubmitVoteMethod
      - CheckEligibilityMethod
      - GetVotingResultsMethod
      - GetElectionStatusMethod
      - AddCandidateMethod
      - StartElectionMethod
      - StopElectionMethod
      - DeclareResultMethod
      - ResetElectionCycleMethod
      - UploadStudentMasterMethod
    Properties:
      RestApiId: !Ref VotingApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref VotingApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  # --- Lambda permissions for API Gateway ---

  AddCandidatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AddCandidateLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  CheckEligibilityPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CheckEligibilityLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  DeclareResultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeclareResultLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  GetCandidatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetCandidateLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VotingApi}/*"

  GetElectionStatusPermission:
